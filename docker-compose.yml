# NO USADO EN EL MVP. El MVP corre con SQLite y sin Docker (decisión del equipo,
# 2026-06-13: iteración más rápida). Este compose es el DESTINO de la migración
# futura a Postgres/Redis: al migrar, levantar con `docker compose up -d` y apuntar
# DATABASE_URL/REDIS_URL aquí. `init.sh` Fase 2 lo trata como opcional (no falla si
# no está arriba). NO levantarlo para desarrollar el MVP.
#
# Infraestructura local del arnés: solo datos, las apps corren nativas
# (mas rapido para el ciclo de iteracion del agente).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
